# Render Blueprint — defines both services in one file.
# Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend: Express API ────────────────────────────────────────────────────
  - type: web
    name: hw5-youtube-chat-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MONGODB_URI
        sync: false   # set manually in the Render dashboard
      - key: REACT_APP_MONGODB_URI
        sync: false   # alternative key name used in code
      - key: REACT_APP_YOUTUBE_API_KEY
        sync: false   # YouTube Data API v3 key

  # ── Frontend: React static site ────────────────────────────────────────────
  - type: static
    name: hw5-youtube-chat-frontend
    plan: free
    buildCommand: npm install && ./node_modules/.bin/react-scripts build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_GEMINI_API_KEY
        sync: false   # baked into JS bundle at build time
      - key: REACT_APP_YOUTUBE_API_KEY
        sync: false   # baked into JS bundle at build time (used for frontend if needed)
      - key: REACT_APP_API_URL
        sync: false   # set to the backend URL, e.g. https://hw5-youtube-chat-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
