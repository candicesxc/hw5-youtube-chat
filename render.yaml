# Render Blueprint — defines both services in one file.
# Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend: Express API ────────────────────────────────────────────────────
  - type: web
    name: hw5-youtube-chat-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: REACT_APP_MONGODB_URI
        sync: false
      - key: REACT_APP_YOUTUBE_API_KEY
        sync: false

  # ── Frontend: React app served by Express ──────────────────────────────────
  - type: web
    name: hw5-youtube-chat-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node serve.js
    envVars:
      - key: REACT_APP_GEMINI_API_KEY
        sync: false
      - key: REACT_APP_YOUTUBE_API_KEY
        sync: false
      - key: REACT_APP_API_URL
        sync: false
      - key: PORT
        value: "3000"
